name: CI

#on:

#   pull_request:
#     branches:
#       - main

env:
  AWS_REGION: ap-southeast-2

jobs:

  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest

    outputs:
      terraform: ${{ steps.filter.outputs.terraform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            terraform:
              - 'terraform/**'

  SAST:
    name: Snyk SAST
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Snyk Terraform Scan
        uses: snyk/actions/iac@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          file: terraform/aws
          args: --severity-threshold=high

  call-terraform-plan-dev:
    name: Call Terraform Plan
    needs: [detect-changes, SAST]
    if: |
      needs.detect-changes.outputs.terraform == 'true'
    uses: ./.github/workflows/tfplan.yml
    with:
      environment: dev
    secrets: inherit
